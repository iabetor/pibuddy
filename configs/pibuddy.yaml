audio:
  sample_rate: 16000
  channels: 1
  frame_size: 512
  mic_gain: 3.0  # 麦克风软件增益倍数，1.0 无增益，2.0 放大 2 倍（适合不灵敏的麦克风）

wake:
  model_path: "./models/kws"
  keywords_file: "./models/kws/keywords.txt"
  threshold: 0.4

vad:
  model_path: "./models/vad/silero_vad.onnx"
  threshold: 0.5
  min_silence_ms: 6000  # 静音 6 秒视为说话结束（平衡响应速度和停顿容忍）

asr:
  # 引擎优先级列表，按顺序尝试
  # 当前只用 sherpa 离线引擎（完全离线，无限制）
  priority:
    - "sherpa"
  # 离线引擎配置（sherpa-onnx）
  model_path: "./models/asr"
  num_threads: 4  # 增加解码线程数，加速 decode，减少 buffer 积压
  # 端点检测设置（控制说话停顿多久视为结束）
  rule1_min_trailing_silence: 3.2  # 尾部静音 >= 3.2 秒触发 endpoint（无文本时，用于超长静音）
  rule2_min_trailing_silence: 1.8  # 尾部静音 >= 1.8 秒触发 endpoint（有文本后，正常停顿结束）
  rule3_min_utterance_length: 20.0  # 语音长度 >= 20 秒强制触发 endpoint
  # 腾讯云配置（可复用 TTS 的密钥，为空则使用 TTS 的密钥）
  tencent:
    # secret_id: "${PIBUDDY_TENCENT_SECRET_ID}"   # 可选，默认使用 TTS 的密钥
    # secret_key: "${PIBUDDY_TENCENT_SECRET_KEY}" # 可选，默认使用 TTS 的密钥
    region: "ap-guangzhou"
    app_id: "${PIBUDDY_TENCENT_APP_ID}"  # 实时语音识别需要，在控制台获取

llm:
  # 多模型优先级列表，按顺序尝试，额度用完/请求失败自动切换到下一个
  # 千问免费额度：每个模型各 100 万 token（2026/05/22 过期）
  # 火山方舟免费额度：豆包全系模型 50 万 token
  # 腾讯混元免费额度：新用户 100 万 token（共享）
  # DeepSeek：付费，作为最终兜底
  models:
    # --- 腾讯混元（延迟最低，优先使用）---
    - name: "hunyuan-lite"
      api_url: "https://api.hunyuan.cloud.tencent.com/v1"
      api_key: "${PIBUDDY_HUNYUAN_API_KEY}"
      model: "hunyuan-lite"
    - name: "hunyuan-turbo"
      api_url: "https://api.hunyuan.cloud.tencent.com/v1"
      api_key: "${PIBUDDY_HUNYUAN_API_KEY}"
      model: "hunyuan-turbo"
    # --- 通义千问（阿里 DashScope，作为备选）---
    - name: "qwen-flash"
      api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      api_key: "${PIBUDDY_QWEN_API_KEY}"
      model: "qwen-flash"
    - name: "qwen-turbo"
      api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      api_key: "${PIBUDDY_QWEN_API_KEY}"
      model: "qwen-turbo"
    - name: "qwen-plus"
      api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      api_key: "${PIBUDDY_QWEN_API_KEY}"
      model: "qwen-plus"
    - name: "qwen-max"
      api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      api_key: "${PIBUDDY_QWEN_API_KEY}"
      model: "qwen-max"
    # --- 火山方舟（字节豆包）---
    - name: "doubao"
      api_url: "https://ark.cn-beijing.volces.com/api/v3"
      api_key: "${PIBUDDY_ARK_API_KEY}"
      model: "${PIBUDDY_ARK_ENDPOINT_ID}"
    # --- DeepSeek（付费兜底）---
    - name: "deepseek-chat"
      api_url: "https://api.deepseek.com/v1"
      api_key: "${PIBUDDY_LLM_API_KEY}"
      model: "deepseek-chat"

  # 以下为兼容旧配置（当 models 列表为空时使用）
  provider: "openai"
  api_url: "https://api.deepseek.com/v1"
  api_key: "${PIBUDDY_LLM_API_KEY}"
  model: "deepseek-chat"
  system_prompt: |
    你是小派，智能家庭助手。语音输入可能有同音字错误，请智能纠正。

    【回复原则】
    像朋友聊天，不要客服腔。不说废话，直接给答案，控制在2-3句内。调用工具时直接调用，不要说"帮你查"。

    【关键规则】
    - 智能家居：必须先调用 ha_list_devices 获取 entity_id，不能自己编造
    - 门锁开锁：必须用户明确要求才能执行，需要 confirm=true
    - 音乐播放：直接调用 play_music，不列搜索结果
    - 声纹查询：调用 whoami 或 list_voiceprint_users
    - 休息命令：\"休息吧\"\"不用了\"等调用 go_to_sleep
    - 天气预报：工具返回JSON数据，用口语回复。禁止Markdown表格，禁止竖线分隔符。直接说人话，如"明天武汉多云转晴，3到17度，早晚凉，带件外套"。
    - 讲故事：用户说\"讲故事\"\"奥特曼的故事你会讲吗\"等 → 调用 tell_story 播放故事。只有用户明确说\"保存这个故事\"才调用 save_story。

    闲聊讲故事可多说几句，日常问答务必精简。
  max_history: 10
  max_tokens: 500

tts:
  engine: "sherpa"   # tencent, edge, sherpa, piper, say
  fallback: "edge"   # 回退引擎
  tencent:
    secret_id: "${PIBUDDY_TENCENT_SECRET_ID}"
    secret_key: "${PIBUDDY_TENCENT_SECRET_KEY}"
    voice_type: 101001
    region: "ap-guangzhou"
    speed: 0
  edge:
    voice: "zh-CN-XiaoxiaoNeural"
  sherpa:
    # 中文 VITS 模型 - 从 https://github.com/k2-fsa/sherpa-onnx/releases 下载
    model_path: "./models/tts/model.onnx"
    tokens_path: "./models/tts/tokens.txt"
    data_dir: "./models/tts/espeak-ng-data"  # 可选，某些模型需要
    noise_scale: 0.667
    length_scale: 1.0
    speed: 1.0
  piper:
    model_path: "./models/piper/zh_CN-huayan-medium.onnx"
  say:
    voice: "Tingting"  # macOS 中文语音，为空使用系统默认

log:
  level: "debug"
  # file: "/var/log/pibuddy/pibuddy.log"  # 日志文件路径，注释掉则只输出到控制台
  max_size: 64      # 单个日志文件最大 64MB
  max_backups: 3    # 保留 3 个旧日志文件
  max_age: 7        # 旧日志文件保留 7 天

dialog:
  continuous_timeout: 10  # 连续对话超时（秒），回复后等待用户继续说话的时间
  wake_reply: "我在"  # 唤醒回复语，为空则不播放
  interrupt_reply: "我在"  # 打断播放时的回复语，区别于唤醒回复
  tool_reply: "稍等，我帮你查一下"  # 工具调用等待提示，为空则不播放
  listen_delay: 300  # 播放回复语后延迟进入监听的时间（毫秒），给用户反应时间

voiceprint:
  enabled: true
  model_path: "./models/voiceprint/3dspeaker_speech_campplus_sv_zh-cn_16k-common.onnx"
  threshold: 0.45
  num_threads: 1
  buffer_secs: 5.0
  owner_name: "主人"  # 主人姓名，用于权限控制

tools:
  data_dir: "~/.pibuddy"
  weather:
    api_host: "q75ctvjkwx.re.qweatherapi.com"
    # JWT 认证（推荐）
    credential_id: "${PIBUDDY_QWEATHER_CREDENTIAL_ID}"
    project_id: "${PIBUDDY_QWEATHER_PROJECT_ID}"
    private_key_path: "./ed25519-private.pem"
    # API Key 认证（回退）
    api_key: "${PIBUDDY_QWEATHER_API_KEY}"
  music:
    enabled: true
    provider: "qq"  # netease 或 qq
    cache_dir: ""        # 缓存目录，默认 {data_dir}/music_cache
    cache_max_size: 500  # 缓存最大大小（MB），0 表示禁用缓存
    # 网易云音乐
    netease:
      api_url: "http://localhost:3000"  # NeteaseCloudMusicApi 地址
    # QQ 音乐
    qq:
      api_url: "http://localhost:3300"  # QQMusicApi 地址
  rss:
    enabled: true
    cache_ttl: 30  # 缓存有效期（分钟），默认 30

  # 倒计时器配置
  timer:
    max_concurrent: 5  # 最大同时运行的倒计时数

  # 音量控制配置
  volume:
    step: 10  # 相对调节步长（如"调大音量"增加10%）

  # 翻译配置（腾讯云机器翻译）
  translate:
    enabled: true
    secret_id: "${PIBUDDY_TENCENT_SECRET_ID}"
    secret_key: "${PIBUDDY_TENCENT_SECRET_KEY}"
    region: "ap-guangzhou"

  # Home Assistant 智能家居配置
  home_assistant:
    enabled: true
    url: "http://localhost:8123"
    token: "${PIBUDDY_HA_TOKEN}"

  # 健康提醒配置
  health:
    enabled: true
    water_interval: 120        # 默认喝水间隔（分钟）
    exercise_interval: 60      # 默认久坐间隔（分钟）
    quiet_hours:
      start: "23:00"           # 静音开始时间
      end: "07:00"             # 静音结束时间

  # 萤石门锁配置
  ezviz:
    enabled: true
    app_key: "${PIBUDDY_EZVIZ_AK}"
    app_secret: "${PIBUDDY_EZVIZ_SK}"
    device_serial: "BC6385600"   # 默认门锁序列号

  # 学习工具配置
  learning:
    enabled: true
    english:
      enabled: true  # 英语学习（单词查询、每日一句、生词本、单词测验）
    poetry:
      enabled: true  # 古诗词（每日一诗、诗词搜索、飞花令、诗词接龙）
      api_key: ""    # 诗词六六六 API Key（可选，免费版无需）

  # 故事功能配置
  story:
    enabled: true
    api:
      enabled: true
      base_url: "https://www.mxnzp.com"
      app_id: "0ixfgmgpnslwgjlg"
      app_secret: "d2rxyjZo5tZ88Oj6oUG2CH7z6d1dBOQ6"
    llm_fallback: true  # 本地和API都没找到时，是否用LLM生成（LLM生成的可保存到库）
    output_mode: "raw"  # 输出模式：raw（原文朗读）、summarize（LLM总结后朗读）
